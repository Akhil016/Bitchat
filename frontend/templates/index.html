<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="auth-overlay" class="overlay">
            <div class="auth-card">
                <h2>Welcome</h2>
                <input type="text" id="reg-username" placeholder="Username">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Password">
                <button onclick="handleSignup()">Sign Up</button>
                <hr>
                <button onclick="toggleAuth()">Already have an account? Login</button>
            </div>
        </div>

        <div id="main-interface" class="hidden">
            <aside id="sidebar">
                <header>
                    <img id="user-avatar" src="default.png" alt="Profile">
                    <div class="actions">
                        <button id="new-chat">+</button>
                    </div>
                </header>
                <div id="chat-list">
                    </div>
            </aside>
            <main id="chat-window">
                <header id="chat-header">
                    <h3 id="contact-name">Select a contact</h3>
                </header>
                <div id="message-container"></div>
                <footer id="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Type a message...">
                    <button id="send-btn">Send</button>
                </footer>
            </main>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="js/encryption.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
