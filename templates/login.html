<div style="max-width: 300px; margin: 100px auto; text-align: center;">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <h2>Login to BitChat</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p style="color: red; font-size: 0.9rem;">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required style="width: 100%; padding: 10px; margin-bottom: 10px;"><br>
        <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 10px; margin-bottom: 10px;"><br>
        <button type="submit" style="width: 100%; padding: 10px; cursor: pointer;">Login</button>
    </form>
    <p>Don't have an account? <a href="/signup">Sign up</a></p>
</div>
