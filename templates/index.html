<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitChat | Private Messaging</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div id="app">
    <header id="header">
        <div class="logo">BitChat <span>v2.0</span></div>
        <div class="user-info">
            <span>Welcome, <b>{{ username }}</b></span>
            <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
        </div>
    </header>

    <div id="main-container">
        
            <aside id="user-list">
            <div class="list-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Messages</h3>
                <button id="show-online-btn" onclick="openOnlineModal()" style="background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">
                    <i class="fa-solid fa-users"></i> Online
                </button>
            </div>
            <ul id="users">
                </ul>
        </aside>

        <div id="online-modal" style="display:none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
    <div style="background: white; padding: 20px; width: 320px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <h4 style="margin:0; color: #0f172a;">Online Now</h4>
            <button onclick="closeOnlineModal()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer; color:#94a3b8;">&times;</button>
        </div>
        <ul id="online-users-list" style="list-style: none; padding: 0; max-height: 300px; overflow-y: auto;">
            </ul>
    </div>
</div>

        <main id="main-chat">
            <div id="chat-header" style="padding: 1rem 2rem; background: white; border-bottom: 1px solid #e2e8f0;">
                <h3 id="target-header" style="font-size: 1.1rem; color: #0f172a;">Select a contact to start</h3>
            </div>

            <div id="chat-box">
                <div style="text-align: center; margin-top: 50px; color: #94a3b8;">
                    <i class="fa-solid fa-lock" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>End-to-end encrypted messaging.</p>
                </div>
            </div>

            <footer id="controls">
                <div class="input-wrapper">
                    <label for="media-input" class="attach-btn">
                        <i class="fa-solid fa-paperclip"></i>
                    </label>
                    <input type="file" id="media-input" style="display: none;" onchange="uploadMedia(this.files[0])">
                    
                    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
                    
                    <button id="send-btn" onclick="sendText()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </footer>
        </main>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>

<script>
    // Handle Enter Key for sending
    document.getElementById('msg-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendText();
        }
    });
</script>

</body>
</html>
