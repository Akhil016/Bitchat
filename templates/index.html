<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitChat | Private Messaging</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <style>
        /* Minimal Responsive Overrides */
        @media (max-width: 768px) {
            #main-container {
                position: relative;
                width: 100%;
                height: calc(100vh - 60px);
                overflow: hidden;
            }

            #user-list {
                width: 100% !important;
                position: absolute;
                left: 0;
                transition: transform 0.3s ease;
                z-index: 1;
            }

            #chat-window {
                width: 100% !important;
                position: absolute;
                left: 0;
                transform: translateX(100%);
                transition: transform 0.3s ease;
                z-index: 2;
                background: #f8fafc; /* Matches your chat background */
            }

            /* State: When a chat is selected */
            #main-container.show-chat #user-list {
                transform: translateX(-100%);
            }
            #main-container.show-chat #chat-window {
                transform: translateX(0);
            }

            #mobile-back {
                display: block !important;
            }
            
            .user-info span { display: none; } /* Hide 'Welcome' text on small screens */
        }
    </style>
</head>
<body>

<div id="app">
    <header id="header">
        <div class="logo">BitChat <span>v2.0 E2EE</span></div>
        <div class="user-info">
            <span>Welcome, <b>{{ username }}</b></span>
            <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
        </div>
    </header>

    <div id="main-container">
        
        <aside id="user-list">
            <div class="list-header" style="display: flex; justify-content: space-between; align-items: center; gap:5px;">
                <h3>Messages</h3>
                <div style="display:flex; gap:5px;">
                    <button onclick="openGroupModal()" style="background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;" title="Create Group">
                        <i class="fa-solid fa-user-plus"></i> Group
                    </button>
                    <button onclick="openOnlineModal()" style="background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;">
                        <i class="fa-solid fa-users"></i> Online
                    </button>
                </div>
            </div>
            <ul id="users"></ul>
        </aside>

        <div id="online-modal" style="display:none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
            <div style="background: white; padding: 20px; width: 320px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                    <h4 style="margin:0; color: #0f172a;">Online Now</h4>
                    <button onclick="closeOnlineModal()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer; color:#94a3b8;">&times;</button>
                </div>
                <ul id="online-users-list" style="list-style: none; padding: 0; max-height: 300px; overflow-y: auto;"></ul>
            </div>
        </div>

        <div id="group-modal" style="display:none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
            <div style="background: white; padding: 20px; width: 320px; border-radius: 12px; position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                    <h4 style="margin:0;">Create Encrypted Group</h4>
                    <button onclick="closeGroupModal()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">&times;</button>
                </div>
                <input type="text" id="group-name" placeholder="Group Name" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Add Users (comma separated):</p>
                <input type="text" id="group-members" placeholder="e.g., alice, bob, charlie" style="width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px;">
                <button onclick="submitCreateGroup()" style="width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">Create Group</button>
            </div>
        </div>

        <main id="main-chat">
            <div id="chat-header" style="display: flex; align-items: center; padding: 1rem; background: white; border-bottom: 1px solid #e2e8f0;">
                <button id="mobile-back" onclick="toggleView(false)" style="display: none; background: none; border: none; font-size: 1.2rem; color: var(--primary); margin-right: 15px; cursor: pointer;">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h3 id="target-header" style="margin: 0; font-size: 1.1rem; color: #0f172a;">Select a contact</h3>
            </div>

            <div id="chat-box">
                <div style="text-align: center; margin-top: 50px; color: #94a3b8;">
                    <i class="fa-solid fa-lock" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>End-to-end encrypted messaging.</p>
                </div>
            </div>

            <footer id="controls">
                <div class="input-wrapper">
                    <label for="media-input" class="attach-btn">
                        <i class="fa-solid fa-paperclip"></i>
                    </label>
                    <input type="file" id="media-input" style="display: none;" onchange="uploadMedia(this.files[0])">
                    
                    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
                    
                    <button id="send-btn" onclick="sendText()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </footer>
        </main>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>

<script>
    document.getElementById('msg-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendText();
    });
</script>

<script>
    // Logic to switch between list and chat on mobile
    function toggleView(showChat) {
        const container = document.getElementById('main-container');
        if (showChat) {
            container.classList.add('show-chat');
        } else {
            container.classList.remove('show-chat');
        }
    }

    // Wrap your existing selectUser logic to trigger the mobile transition
    const originalSelectUser = window.selectUser;
    window.selectUser = function(target, isGroup) {
        if (typeof originalSelectUser === 'function') {
            originalSelectUser(target, isGroup);
        }
        if (window.innerWidth <= 768) {
            toggleView(true);
        }
    };
</script>

</body>
</html>
