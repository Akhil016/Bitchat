<div style="max-width: 300px; margin: 100px auto; text-align: center; font-family: sans-serif;">
    <h2>Create Account</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p style="color: red;">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    <form method="POST">
        <input type="text" name="username" placeholder="Username" required style="width: 100%; padding: 10px; margin-bottom: 10px;"><br>
        <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 10px; margin-bottom: 10px;"><br>
        <button type="submit" style="width: 100%; padding: 10px; cursor: pointer;">Sign Up</button>
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</div>
