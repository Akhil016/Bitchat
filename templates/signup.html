<div style="width: 100%; max-width: 350px; margin: 80px auto; text-align: center; padding: 20px; box-sizing: border-box; font-family: sans-serif;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    
    <h2 style="margin-bottom: 25px; color: #1e293b;">Create Account</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p style="color: #ef4444; font-size: 0.9rem; background: #fee2e2; padding: 10px; border-radius: 5px;">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required 
               style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
        
        <input type="password" name="password" placeholder="Password" required 
               style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
        
        <button type="submit" 
                style="width: 100%; padding: 12px; background: var(--primary, #6366f1); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem;">
            Sign Up
        </button>
    </form>
    
    <p style="margin-top: 20px; color: #64748b; font-size: 0.95rem;">
        Already have an account? <a href="/login" style="color: #6366f1; text-decoration: none; font-weight: 500;">Login</a>
    </p>
</div>
